name: Build and Release

on:
  push:
    branches:
      - main # main 分支触发
      - master # master 分支触发
  workflow_dispatch: # 手动触发

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 检查已有tag

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install specific npm version
        run: npm install -g npm@10

      - name: Use official npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Get version & extension name from extension.json
        id: meta
        run: |
          echo "VERSION=$(jq -r .version extension.json)" >> $GITHUB_ENV
          echo "EEXTNAME=$(jq -r .name extension.json)" >> $GITHUB_ENV

      - name: Check and create tag
        id: check_tag
        run: |
          VERSION=${{ env.VERSION }}
          TAG="v${VERSION}"

          echo "🔎 检查 tag $TAG 是否存在..."
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️ Tag $TAG 已存在，跳过发布。"
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            echo "✅ Tag $TAG 不存在，创建并推送。"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Extract changelog for version
        if: env.SKIP_RELEASE == 'false'
        id: changelog
        run: |
          VERSION=${{ env.VERSION }}
          EEXTNAME=${{ env.EEXTNAME }}
          echo "🔎 Extracting changelog for version $VERSION from CHANGELOG.md"

          # 从 CHANGELOG.md 提取当前版本的变更内容（匹配 ## [x.y.z] 开头，支持带或不带日期后缀）
          NOTES=$(awk -v ver="$VERSION" '
            BEGIN {flag=0}
            /^## \[/ {
              if (flag) exit
              if (index($0, "[" ver "]")) { flag=1; next }
            }
            flag {print}
          ' CHANGELOG.md)

          # 去除首尾空行
          NOTES=$(echo "$NOTES" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba}')

          if [ -z "$NOTES" ]; then
            echo "⚠️ No changelog entry found for version $VERSION, using default notes."
            NOTES="Release v${VERSION}"
          fi

          # 使用 heredoc 安全写入多行内容到 GITHUB_ENV，避免反引号/特殊字符被解释
          {
            echo "RELEASE_NOTES<<CHANGELOG_EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo "由GitHub Actions自动构建并发布"
            echo "Built and released automatically by GitHub Actions"
            echo ""
            echo "也可前往[嘉立创EDA扩展广场](https://ext.lceda.cn/item/oshwhub/${EEXTNAME})下载"
            echo "Also available at [JLCEDA Extension Plaza](https://extensions.oshwhub.com/item/oshwhub/${EEXTNAME})"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_ENV"

          echo "------ Release Notes ------"
          echo "$NOTES"
          echo "---------------------------"

      - name: Debug check artifact
        if: env.SKIP_RELEASE == 'false'
        run: |
          VERSION=${{ env.VERSION }}
          EEXTNAME=${{ env.EEXTNAME }}
          FILE="build/dist/${EEXTNAME}_v${VERSION}.eext"
          if [ -f "$FILE" ]; then
            echo "✅ 产物存在: $FILE"
          else
            echo "❌ 未发现产物: $FILE"
            ls -R build || true
            exit 1
          fi

      - name: Upload Release
        if: env.SKIP_RELEASE == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: ${{ env.RELEASE_NOTES }}
          files: build/dist/${{ env.EEXTNAME }}_v${{ env.VERSION }}.eext
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
